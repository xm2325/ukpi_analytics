name: deploy-dashboard-pages
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}guided_dashboard.html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dashboard files
        run: |
          test -f docs/ukpi_dashboard.html
          test -f docs/guided_dashboard.html
          grep -q "UKPI Client Segmentation and Offer Analytics" docs/ukpi_dashboard.html
          grep -q "How to read it" docs/guided_dashboard.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
